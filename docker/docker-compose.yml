services:
  bundler:
    image: stackup/stackup-bundler:latest
    environment:
      ERC4337_BUNDLER_ETH_CLIENT_URL: ${RPC_URL_TESTNET}
      ERC4337_BUNDLER_PRIVATE_KEY: ${BUNDLER_PRIVATE_KEY}
      ERC4337_BUNDLER_MAX_BATCH_GAS_LIMIT: 5000000
      ERC4337_BUNDLER_ENTRY_POINTS: ${ENTRYPOINT_ADDRESS}
    ports:
      - "4337:4337"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- --header='Content-Type: application/json' --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_chainId\",\"params\":[]}' http://127.0.0.1:4337 >/dev/null"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  paymaster-api:
    build:
      context: ..
      dockerfile: docker/paymaster-api.Dockerfile
    env_file:
      - .env
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      bundler:
        condition: service_healthy
